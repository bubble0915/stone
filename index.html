<!DOCTYPE html>
<html lang="ja">
<body>
    <h1>AI鑑定テスト</h1>
    <input type="text" id="stone" value="水晶">
    <button onclick="check()">鑑定実行</button>
    <div id="out" style="color:red; font-weight:bold; margin-top:20px;"></div>

    <script>
        const KEY = 'AIzaSyCAZ-uhjNWnjQXN4uV9a0_2UyF7xmLajO4';

        async function check() {
            const out = document.getElementById('out');
            out.innerHTML = "通信中...";
            // 2026年3月現在、最も安定している「v1beta」エンドポイント
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "水晶の石言葉を10文字で" }] }] })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                out.style.color = "blue";
                out.innerHTML = "成功！結果：" + data.candidates[0].content.parts[0].text;
            } catch (e) {
                out.innerHTML = "エラー原因：" + e.message;
            }
        }
    </script>
</body>
</html>
