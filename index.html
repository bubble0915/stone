<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>石のつぶやきAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>石のつぶやきAI</h1>
      <p class="subtitle">天然石の声に、そっと耳をすませる小さな案内役</p>
    </header>

    <main class="card">
      <p class="intro">
        気になる天然石のことを、やさしくたずねてみてください。<br>
        石の意味や雰囲気を、寄り添う言葉でお返しします。
      </p>

      <form id="stone-form">
        <label for="stone-input" class="label">ご相談内容</label>
        <textarea
          id="stone-input"
          placeholder="例：ローズクォーツは今の私にどんなメッセージをくれますか？"
          required
        ></textarea>

        <button type="submit" id="send-button">石にたずねる</button>
      </form>

      <section class="result-section">
        <h2>石からのことば</h2>
        <div id="stone-output" class="result-box">
          ここにやさしいメッセージが表示されます。
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>石のつぶやきAI</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
