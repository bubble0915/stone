<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石のつぶやきAI</title>
    <style>
        /* 1番目のデザインをベースにした高級感のあるスタイル */
        body { 
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%); 
            color: #e94560; 
            text-align: center; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; text-shadow: 0 0 15px #e94560; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        input { 
            padding: 15px; 
            width: 85%; 
            border-radius: 12px; 
            border: none; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
        }
        button { 
            padding: 15px 40px; 
            border-radius: 50px; 
            background: #e94560; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
        }
        button:hover { transform: scale(1.05); background: #ff4d6d; }
        #resultArea { 
            margin-top: 35px; 
            padding: 20px; 
            min-height: 120px; 
            color: #e0e0e0; 
            line-height: 1.8;
            text-align: left;
            background: rgba(0,0,0,0.25);
            border-radius: 15px;
            font-size: 15px;
        }
        .loading { color: #aaa; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 石のつぶやきAI</h1>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 25px;">石の名を、あるいは今の想いをお聞かせください</p>
        
        <input type="text" id="stoneInput" placeholder="例：水晶、心穏やかに過ごしたい">
        <br>
        <button onclick="execute()">石の声を聴く</button>
        
        <div id="resultArea">※ここに鑑定結果が静かに現れます</div>
    </div>

    <script>
        const KEY = 'AIzaSyCAZ-uhjNWnjQXN4uV9a0_2UyF7xmLajO4';

        async function execute() {
            const out = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value.trim();
            if(!input) return;

            out.innerHTML = '<span class="loading">✨ 石の意識と繋がっています...</span>';

            try {
                // モデル取得から実行までを一気に行い、エラーを回避します
                const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${KEY}`);
                const listData = await listRes.json();
                const target = listData.models.find(m => m.supportedGenerationMethods.includes('generateContent'));
                
                if (!target) throw new Error("通信環境を整えています。もう一度お試しください。");

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${target.name}:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: "あなたは謙虚で心優しい天然石鑑定士です。決して偉そうにせず、相談者に寄り添う言葉遣いで、" + input + "についての石言葉と、持ち主が前向きになれるようなメッセージを150文字以内で優しく語りかけてください。" }] 
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = text.replace(/\n/g, '<br>');

            } catch (e) {
                out.innerHTML = "申し訳ありません。石との交信がうまくいきませんでした。少し時間を置いてみてください。";
            }
        }
    </script>
</body>
</html>
