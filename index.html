<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>石のつぶやきAI</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #764ba2; }
        #result { margin-top: 30px; text-align: left; white-space: pre-wrap; color: #555; line-height: 1.6; font-size: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ 石のつぶやきAI</h1>
        <p>気になる石の名前を入力してください</p>
        <input type="text" id="stoneInput" placeholder="例：ラピスラズリ">
        <button onclick="askAI()">石の声を聴く</button>
        <div id="result"></div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('stoneInput').value;
            const resDiv = document.getElementById('result');
            if (!input) return alert("石の名前を入れてね");

            resDiv.innerText = "石と対話中...";

            try {
                // ★ばぶるさんのWorkerのURLをここに入れてください
                const WORKER_URL = "ここにWorkerのURLを貼る";
                
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    body: JSON.stringify({ input: input })
                });
                const data = await response.json();

                if (data.ok) {
                    resDiv.innerText = "【石からのメッセージ】\n\n" + data.text;
                } else {
                    resDiv.innerText = "エラー: " + data.error;
                }
            } catch (e) {
                resDiv.innerText = "接続に失敗しました。URLを確認してください。";
            }
        }
    </script>
</body>
</html>
