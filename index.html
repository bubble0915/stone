<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>石のつぶやきAI</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="bg-glow"></div>

  <main class="app">
    <header class="hero">
      <div class="hero-badge">天然石辞典 × 気持ちに合う石提案</div>
      <h1>石のつぶやきAI</h1>
      <p class="hero-text">
        石の名前を入れると、辞典のように意味や効能をお返しします。<br>
        今の気持ちを入れると、対処法と、その状況に合う石を最大3つご提案します。
      </p>
    </header>

    <section class="card input-card">
      <form id="stone-form">
        <div class="field">
          <label for="user-input">石の名前、または今の気持ち</label>
          <textarea
            id="user-input"
            placeholder="例1：アメジスト&#10;例2：最近疲れていて、心を落ち着かせたいです"
            required
          ></textarea>
        </div>

        <button type="submit" id="send-button">調べる</button>
      </form>
    </section>

    <section class="card result-card">
      <div class="result-header">
        <h2>結果</h2>
        <p>返ってきた内容を全部そのまま表示します</p>
      </div>

      <div id="loading" class="loading hidden">静かに読み取っています…</div>
      <div id="result-empty" class="empty-state">ここに結果が表示されます。</div>
      <div id="result-meta" class="result-meta hidden"></div>

      <div id="result-area" class="result-area hidden">
        <pre id="result-text"></pre>
      </div>
    </section>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
