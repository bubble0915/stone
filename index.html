<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI天然石鑑定テスト</title>
</head>
<body style="background-color: black; color: white; text-align: center; padding-top: 50px;">
    <h1>✨ AI鑑定 動作確認中 ✨</h1>
    <p>画面が見えていれば、第一段階はクリアです。</p>
    
    <input type="text" id="stoneInput" value="水晶">
    <button id="testBtn" style="padding: 10px 20px;">鑑定ボタン</button>
    
    <div id="resultArea" style="margin-top: 30px; color: yellow;"></div>

    <script>
        // ボタンが押せるかどうかのテスト
        document.getElementById('testBtn').onclick = function() {
            document.getElementById('resultArea').innerHTML = 'ボタンは正常に動いています。キーを正しく入れれば完了です。';
        };
    </script>
</body>
</html>
