<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石のつぶやきAI</title>
    <style>
        /* 初代デザインの完全再現 */
        body { 
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%); 
            color: #e94560; 
            text-align: center; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; text-shadow: 0 0 15px #e94560; margin-bottom: 25px; font-weight: bold; }
        input { 
            padding: 15px; 
            width: 85%; 
            border-radius: 12px; 
            border: none; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
        }
        button { 
            padding: 15px 40px; 
            border-radius: 50px; 
            background: #e94560; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #ff4d6d; }
        #resultArea { 
            margin-top: 30px; 
            padding: 20px; 
            min-height: 120px; 
            color: #e0e0e0; 
            line-height: 1.8;
            text-align: left;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 石のつぶやきAI</h1>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 20px;">あなたの心と、石を繋ぎます</p>
        
        <input type="text" id="stoneInput" placeholder="例：水晶、最近疲れ気味...">
        <br>
        <button onclick="execute()">石の声を聴く</button>
        
        <div id="resultArea">※ここに鑑定結果が優しく現れます</div>
    </div>

    <script>
        // あなたの有効なAPIキー
        const KEY = 'AIzaSyCAZ-uhjNWnjQXN4uV9a0_2UyF7xmLajO4';

        async function execute() {
            const out = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value.trim();
            if(!input) return;

            out.innerHTML = '✨ 石が言葉を探しています...';

            // エラーを物理的に回避するため、最も標準的なモデル名に固定
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: "あなたは謙虚で寄り添うような言葉遣いの石の鑑定士です。決して偉そうにせず、親身な態度で、" + input + "の石言葉とメッセージを150文字以内で優しくつぶやいてください。" }] 
                        }]
                    })
                });

                const data = await response.json();

                // モデル名エラーが起きた場合の予備回路
                if (data.error) {
                    const fallbackUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${KEY}`;
                    const res2 = await fetch(fallbackUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: input + "の石言葉を優しく教えて。" }] }] })
                    });
                    const data2 = await res2.json();
                    out.innerHTML = data2.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                } else {
                    const text = data.candidates[0].content.parts[0].text;
                    out.innerHTML = text.replace(/\n/g, '<br>');
                }

            } catch (e) {
                out.innerHTML = "申し訳ありません。石のつぶやきが届きませんでした。もう一度だけ、静かにボタンを押してみてください。";
            }
        }
    </script>
</body>
</html>
