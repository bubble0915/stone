<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI天然石鑑定士</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #stoneInput { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; background: #66f; color: #fff; border: none; cursor: pointer; }
        #resultArea { margin-top: 20px; padding: 20px; min-height: 100px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>✨ AI天然石鑑定士</h1>
    <p>石の名前や、今の悩みを入力してください</p>
    <input type="text" id="stoneInput" placeholder="例：水晶、最近疲れている">
    <button onclick="execute()">石の声を聴く</button>
    <div id="resultArea"></div>

    <script>
        // 【重要】ここに ...2896 のプロジェクトで作った新しいキーを貼る
        const KEY = 'AIzaSyCQGI4FaAFvLpTyI2Em5IGoAm3_02hNAYI'; 

        async function execute() {
            const resArea = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value.trim();
            if (!input) return alert('入力してください');

            resArea.innerHTML = '✨ 石と共鳴中...';

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input + "について、石と言葉と癒やしのメッセージを150文字以内で。" }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                resArea.innerHTML = text;
            } catch (e) {
                resArea.innerHTML = "エラーが発生しました: " + e.message;
            }
        }
    </script>
</body>
</html>
