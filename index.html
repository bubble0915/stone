<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>石のつぶやきAI</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #4A90E2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; text-align: left; white-space: pre-wrap; line-height: 1.6; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>石のつぶやきAI</h1>
        <p>石の名前を入力してね</p>
        <input type="text" id="stoneName" placeholder="例：水晶、ラピスラズリ">
        <button onclick="checkStone()">調べる</button>
        <div id="result"></div>
    </div>

    <script>
        async function checkStone() {
            const name = document.getElementById('stoneName').value;
            const resultDiv = document.getElementById('result');
            if (!name) return alert("石の名前を入れてね");

            resultDiv.innerText = "鑑定中...";

            // ★ ばぶるさんのキーを直接使います。Workerは通しません！
            const API_KEY = "AIzaSyBQRLbNyKIA0ccgW_Uj0DdZ1vb8aqbqKhY";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `あなたは「石のつぶやきAI」です。${name}という石の声を代弁して、最後の一文字まで詳しく詳しく丁寧に回答してください。` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerText = "エラー: " + data.error.message;
                } else {
                    resultDiv.innerText = "【鑑定結果】\n\n" + data.candidates[0].content.parts[0].text;
                }
            } catch (e) {
                resultDiv.innerText = "通信エラーが発生しました。";
            }
        }
    </script>
</body>
</html>
