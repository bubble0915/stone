<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石のつぶやきAI</title>
    <style>
        /* ここからがCSS（デザイン）です */
        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        /* 幻想的な光の背景 */
        .aura {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1b4b 0%, #000 80%);
            z-index: -1;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px 40px;
            width: 85%; max-width: 400px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 20px rgba(255,255,255,0.05);
        }
        h1 {
            font-size: 24px; letter-spacing: 8px; margin-bottom: 40px;
            font-weight: 200; color: #fff; text-shadow: 0 0 15px #66f;
        }
        input {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 0; color: #fff; font-size: 18px;
            outline: none; text-align: center; margin-bottom: 40px;
            transition: 0.5s;
        }
        input:focus { border-bottom: 1px solid #fff; }
        button {
            background: none; border: 1px solid #fff; color: #fff;
            padding: 15px 50px; border-radius: 100px; cursor: pointer;
            font-size: 14px; letter-spacing: 4px; transition: 0.5s;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        #resultArea {
            margin-top: 50px; font-size: 15px; line-height: 2.2;
            text-align: left; color: #ccc; min-height: 150px;
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px;
        }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="container">
        <h1>石のつぶやきAI</h1>
        <input type="text" id="stoneInput" placeholder="石の名を...">
        <br>
        <button onclick="execute()">運命を聴く</button>
        <div id="resultArea">※静寂の中に答えが現れます</div>
    </div>

    <script>
        const KEY = 'AIzaSyCAZ-uhjNWnjQXN4uV9a0_2UyF7xmLajO4';

        async function execute() {
            const out = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value.trim();
            if(!input) return;

            out.innerHTML = '✨ 石の記憶を呼び覚ましています...';

            // エラーを回避するため、さきほど「動いた」ときと同じ、もっとも通るエンドポイントを指定
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input + "という天然石について、石の神託者として、石言葉と癒やしのメッセージを150文字以内で語って。" }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // エラーが出た場合のみ、原因を表示する
                    out.innerHTML = "【通信不備】" + data.error.message;
                    return;
                }

                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = text.replace(/\n/g, '<br>');

            } catch (e) {
                out.innerHTML = "【接続失敗】Google側が混み合っているようです。";
            }
        }
    </script>
</body>
</html>
