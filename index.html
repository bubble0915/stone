<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>石のつぶやきAI</title>
  <style>
    :root { --bg1: #07122b; --bg2: #101f47; --card: rgba(16, 28, 63, 0.92); --text: #ffffff; --accent: #d94a7a; --soft: #ffd7e6; }
    body { margin: 0; font-family: sans-serif; color: var(--text); background: linear-gradient(180deg, var(--bg1), var(--bg2)); min-height: 100vh; }
    .app { max-width: 800px; margin: 0 auto; padding: 20px; }
    .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    textarea { width: 100%; min-height: 120px; border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff; padding: 10px; }
    button { width: 100%; padding: 15px; border-radius: 10px; background: var(--accent); color: #fff; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
    .hidden { display: none; }
    #result-area { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-top: 20px; }
    #result-text { white-space: pre-wrap; word-break: break-word; line-height: 1.8; color: #fff; display: block !important; min-height: 50px; }
    .meta { color: var(--soft); font-weight: bold; margin-bottom: 10px; display: block; }
  </style>
</head>
<body>
  <main class="app">
    <h1>石のつぶやきAI</h1>
    <section class="card">
      <textarea id="user-input" placeholder="アメジスト、または今の悩みを入力..."></textarea>
      <button id="send-btn">調べる</button>
    </section>

    <div id="loading" class="hidden">読み取り中...</div>

    <section id="result-area" class="hidden">
      <span id="result-meta" class="meta"></span>
      <pre id="result-text"></pre>
    </section>
  </main>

  <script>
    const WORKER_URL = "https://stone-01.its-brg77.workers.dev";
    const btn = document.getElementById("send-btn");
    const input = document.getElementById("user-input");
    const resultArea = document.getElementById("result-area");
    const resultText = document.getElementById("result-text");
    const resultMeta = document.getElementById("result-meta");
    const loading = document.getElementById("loading");

    btn.addEventListener("click", async () => {
      const val = input.value.trim();
      if (!val) return;

      btn.disabled = true;
      loading.classList.remove("hidden");
      resultArea.classList.add("hidden");
      resultText.textContent = "";

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: val })
        });

        const data = await res.json();
        resultArea.classList.remove("hidden");

        if (data.ok) {
          resultMeta.textContent = "【鑑定結果】";
          resultText.textContent = data.text;
        } else {
          resultMeta.textContent = "【サーバーからの警告】";
          // ★ここ！もし中身がなくても「何かが起きた」ことを強制表示
          resultText.textContent = data.error || "詳細不明のエラー。Workerの設定を確認してください。";
        }
      } catch (e) {
        resultArea.classList.remove("hidden");
        resultMeta.textContent = "【通信エラー】";
        resultText.textContent = "接続に失敗しました: " + e.message;
      } finally {
        loading.classList.add("hidden");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
