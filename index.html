<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI天然石鑑定士</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        /* あなたが求めていた「輝く背景」を演出するコンテナ */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 90%; max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7);
        }
        h1 {
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 15px #66f; /* 水晶のような輝き */
            margin-bottom: 30px;
        }
        input {
            width: 80%; padding: 15px; border-radius: 12px; border: none;
            background: rgba(255, 255, 255, 0.1); color: #fff;
            font-size: 16px; margin-bottom: 20px; outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        button {
            padding: 15px 40px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        #resultArea {
            margin-top: 30px; padding: 20px;
            background: rgba(0, 0, 0, 0.2); border-radius: 15px;
            min-height: 120px; text-align: left; line-height: 1.8;
            color: #e0e0e0; font-size: 15px; border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AI天然石鑑定士</h1>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">石の名前や今の悩みを入力してください</p>
        
        <input type="text" id="stoneInput" placeholder="例：ラピスラズリ">
        <br>
        <button onclick="execute()">石の声を聴く</button>
        
        <div id="resultArea">ここに鑑定結果が表示されます</div>
    </div>

    <script>
        // さきほど「動いた」成功キーです
        const KEY = 'AIzaSyCAZ-uhjNWnjQXN4uV9a0_2UyF7xmLajO4';

        async function execute() {
            const out = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value.trim();
            if(!input) return;

            out.innerHTML = '✨ 石の記憶と共鳴中...';

            // さきほど成功した「確実なURL」
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input + "について、石の鑑定士として、石言葉と癒やしのメッセージを150文字以内で優しく語りかけて。" }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = text.replace(/\n/g, '<br>');

            } catch (e) {
                out.innerHTML = '<span style="color:#ffb3b3;">鑑定エラー：再試行してください</span>';
            }
        }
    </script>
</body>
</html>
