<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>石のつぶやきAI</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-glow"></div>

  <main class="app">

    <!-- ヘッダー -->
    <header class="hero">
      <div class="hero-badge">天然石辞典 × 気持ちに合う石提案</div>
      <h1>石のつぶやきAI</h1>
      <p class="hero-text">
        石の名前や気持ちを入力すると、あなたに寄り添う石を提案します。<br>
        タロット占いもあわせて、今のあなたに必要なメッセージをお届けします。
      </p>
    </header>

    <!-- 入力 -->
    <section class="card input-card">
      <form id="stone-form">
        <div class="field">
          <label for="user-input">石の名前、または今の気持ち</label>
          <textarea
            id="user-input"
            placeholder="例：アメジスト / 最近疲れている"
            required
          ></textarea>
        </div>

        <button type="submit" id="send-button">調べる</button>
      </form>
    </section>

    <!-- タロット -->
    <section class="card tarot-card">
      <h2>タロット占い</h2>

      <div class="tarot-buttons">
        <button onclick="runTarot('today')">今日の運勢</button>
        <button onclick="runTarot('week')">今週の運勢</button>
        <button onclick="runTarot('love')">恋愛運</button>
        <button onclick="runTarot('general')">全体運</button>
        <button onclick="runTarot('3card')">3枚引き</button>
      </div>
    </section>

    <!-- 通知 -->
    <section class="card notify-card">
      <h2>浄化通知</h2>
      <p>満月や定期的な浄化タイミングをお知らせします</p>

      <button onclick="enablePush()">
        通知ON（浄化タイミング）
      </button>
    </section>

    <!-- 結果 -->
    <section class="card result-card">

      <div class="result-header">
        <h2>結果</h2>
        <p>AIがあなたに寄り添った結果を表示します</p>
      </div>

      <div id="loading" class="loading hidden">
        静かに読み取っています…
      </div>

      <div id="result-empty" class="empty-state">
        ここに結果が表示されます。
      </div>

      <div id="result-meta" class="result-meta hidden"></div>

      <div id="image-wrap" class="image-wrap hidden">
        <img id="stone-image" alt="石の画像" />
      </div>

      <div id="result-area" class="result-area hidden">
        <pre id="result-text"></pre>
      </div>

    </section>

    <!-- ショップ導線 -->
    <section class="card shop-card">
      <h2>おすすめの石はこちら</h2>
      <p>あなたに合う石を実際に手に取ってみませんか？</p>

      <a
        href="https://brgholdgs.base.shop"
        target="_blank"
        class="shop-button"
      >
        石のつぶやきショップを見る
      </a>
    </section>

  </main>

  <!-- スクリプト -->
  <script src="app.js"></script>
  <script src="notify.js"></script>

  <!-- Service Worker登録 -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>

</body>
</html>
