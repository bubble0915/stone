<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>石のつぶやきAI</title>
  <link rel="stylesheet" href="style.css?v=40" />
</head>
<script>
  alert("index.html は最新です");
</script>
  <body>
  <div class="bg-glow"></div>

  <main class="app">
    <header class="hero">
      <div class="hero-badge">天然石辞典 × 石提案 × タロット補助診断</div>
      <h1>石のつぶやきAI</h1>
      <p class="hero-text">
        石の名前を入れると辞典のように説明します。<br>
        気持ちを入れると、対処法と合う石を提案します。<br>
        タロットは補助診断として使えます。
      </p>
    </header>

    <section class="card input-card">
      <form id="stone-form">
        <div class="field">
          <label for="user-input">石の名前・気持ち・占い</label>
          <textarea
            id="user-input"
            placeholder="例：アメジスト&#10;最近疲れている&#10;今日の運勢"
            required
          ></textarea>
        </div>

        <button type="submit" id="send-button">調べる</button>
      </form>

      <div class="quick-menu-wrap">
        <h3>ワンタップ占い</h3>
        <div class="quick-menu">
          <button type="button" class="quick-btn" data-fill="今日の運勢">今日の運勢</button>
          <button type="button" class="quick-btn" data-fill="今週の運勢">今週の運勢</button>
          <button type="button" class="quick-btn" data-fill="恋愛運">恋愛運</button>
          <button type="button" class="quick-btn" data-fill="全体運">全体運</button>
          <button type="button" class="quick-btn" data-fill="3枚引き">3枚引き</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="result-header">
        <h2>浄化通知設定</h2>
        <p>満月通知と定期浄化通知を受け取れます</p>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="notify-fullmoon" checked />
          満月の日に月光浄化を通知する
        </label>
      </div>

      <div class="field">
        <label for="notify-interval">定期浄化の間隔</label>
        <select id="notify-interval">
          <option value="7">7日ごと</option>
          <option value="14">14日ごと</option>
          <option value="30">30日ごと</option>
        </select>
      </div>

      <div class="field">
        <label for="notify-method">おすすめする浄化方法</label>
        <select id="notify-method">
          <option value="cluster">水晶クラスター</option>
          <option value="moonlight">月光</option>
          <option value="running_water">流水</option>
          <option value="sage">セージ</option>
        </select>
      </div>

      <div class="quick-menu">
        <button type="button" id="enable-notify">🔔 通知を有効にする</button>
        <button type="button" id="disable-notify">🔕 通知を解除する</button>
        <button type="button" id="send-test-notify">🧪 テスト通知を送る</button>
      </div>

      <div id="notify-status" class="result-meta" style="margin-top:12px;">未設定</div>
    </section>

    <section class="card result-card">
      <div class="result-header">
        <h2>結果</h2>
        <p>全文表示されます</p>
      </div>

      <div id="loading" class="loading hidden">静かに読み取っています…</div>
      <div id="result-empty" class="empty-state">ここに結果が表示されます</div>
      <div id="result-meta" class="result-meta hidden"></div>

      <div id="image-wrap" class="image-wrap hidden">
        <img id="stone-image" alt="石のイメージ画像" />
      </div>

      <div id="tarot-image-wrap" class="image-wrap hidden">
        <img id="tarot-image" alt="タロット画像" />
      </div>

      <div id="recommended-wrap" class="recommended-wrap hidden">
        <h3>おすすめの石</h3>
        <div id="recommended-list" class="recommended-list"></div>
      </div>

      <div id="shop-wrap" class="shop-wrap hidden">
        <div class="shop-title">気になる石はこちら</div>
        <a id="shop-link" class="shop-link" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <div id="result-area" class="result-area hidden">
        <pre id="result-text"></pre>
      </div>
    </section>
  </main>

  <script src="app.js?v=40"></script>
  <script src="notify.js?v=40"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("user-input");
      const form = document.getElementById("stone-form");

      document.querySelectorAll(".quick-btn[data-fill]").forEach((btn) => {
        btn.addEventListener("click", () => {
          input.value = btn.dataset.fill || "";
          input.focus();

          if (form.requestSubmit) {
            form.requestSubmit();
          } else {
            form.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
          }
        });
      });
    });
  </script>
<button onclick="alert('ボタンは押せています')">通知を有効にする</button>
</body>
  </body>
</html>
