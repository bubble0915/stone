<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石のつぶやきAI</title>
    <style>
        /* 1番目のデザイン：紺色グラデーションと赤ピンクのボタン */
        body { 
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%); 
            color: #e94560; 
            text-align: center; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 95%;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; text-shadow: 0 0 10px #e94560; margin-bottom: 25px; }
        input { 
            padding: 15px; 
            width: 85%; 
            border-radius: 10px; 
            border: none; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
        }
        button { 
            padding: 15px 40px; 
            border-radius: 10px; 
            background: #e94560; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #ff4d6d; }
        #resultArea { 
            margin-top: 30px; 
            padding: 20px; 
            min-height: 120px; 
            color: #e0e0e0; 
            line-height: 2;
            text-align: left;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 石のつぶやきAI</h1>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 20px;">あなたの心に、石の言葉をそっと届けます</p>
        
        <input type="text" id="stoneInput" placeholder="例：ラピスラズリ、仕事で成功したい">
        <br>
        <button onclick="execute()">石の声を聴く</button>
        
        <div id="resultArea">※ここに優しいつぶやきが現れます</div>
    </div>

    <script>
        const KEY = 'AIzaSyCAZ-uhjNWnjQXN4uV9a0_2UyF7xmLajO4';

        async function execute() {
            const out = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value.trim();
            if(!input) return;

            out.innerHTML = '✨ 石があなたの想いを受け止めています...';

            // さきほど成功した「8b」モデルを名指しで指定
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: "あなたは謙虚で心優しい天然石鑑定士です。決して偉そうにせず、相談者に寄り添う言葉遣いで、" + input + "についての石言葉と、持ち主が前向きになれるようなメッセージを150文字以内で優しく語りかけてください。" }] 
                        }]
                    })
                });

                const data = await response.json();
                
                // もし「8b」でもダメな場合の究極の保険：名前を「gemini-1.5-flash」にして再試行
                if (data.error) {
                    const retryUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                    const res2 = await fetch(retryUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: input + "の石言葉を優しく教えて。" }] }] })
                    });
                    const data2 = await res2.json();
                    out.innerHTML = data2.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                } else {
                    const text = data.candidates[0].content.parts[0].text;
                    out.innerHTML = text.replace(/\n/g, '<br>');
                }

            } catch (e) {
                out.innerHTML = "石のつぶやきが届きませんでした。もう一度だけ、優しくボタンを押してみてください。";
            }
        }
    </script>
</body>
</html>
