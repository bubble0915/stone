<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI天然石鑑定士</title>
</head>
<body style="background-color: #16213e; color: white; text-align: center; padding-top: 50px; font-family: sans-serif;">
    <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; display: inline-block;">
        <h1>🔮 AI天然石鑑定所</h1>
        <input type="text" id="stoneInput" value="水晶" style="padding: 10px;">
        <button id="execBtn" style="padding: 10px 20px; background: #e94560; color: white; border: none; cursor: pointer;">石の声を聴く</button>
        <div id="resultArea" style="margin-top: 30px; color: #00ffcc; max-width: 400px;">※鑑定結果待ち</div>
    </div>

    <script>
        const KEY = 'AIzaSyD6zFfwmA41hvoEHwE9rCjjwfqh6eiWIbY'; 

        document.getElementById('execBtn').onclick = async function() {
            const resArea = document.getElementById('resultArea');
            const input = document.getElementById('stoneInput').value;
            resArea.innerHTML = '✨ 接続可能な石の精霊を探しています...';

            try {
                // 1. 今使えるモデルをリストアップする
                const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${KEY}`);
                const listData = await listRes.json();
                
                // 2. 鑑定ができるモデル（gemini-1.5-flashなど）を自動で見つける
                const target = listData.models.find(m => m.supportedGenerationMethods.includes('generateContent') && m.name.includes('gemini-1.5'));
                
                if (!target) throw new Error("利用可能なモデルが見つかりません。APIの有効化を確認してください。");
                
                resArea.innerHTML = `✨ ${target.displayName} で鑑定中...`;

                // 3. 見つけたモデル名で鑑定を実行
                const runUrl = `https://generativelanguage.googleapis.com/v1beta/${target.name}:generateContent?key=${KEY}`;
                const runRes = await fetch(runUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input + "について、石言葉と癒やしのメッセージを100文字で教えて。" }] }]
                    })
                });

                const runData = await runRes.json();
                resArea.innerHTML = runData.candidates[0].content.parts[0].text;

            } catch (e) {
                resArea.innerHTML = '鑑定失敗: ' + e.message;
            }
        };
    </script>
</body>
</html>
